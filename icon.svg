        c -16.3 27.1 -38.5 50.7 -62.3 68.8
        c -6.2 -32.3 3.6 -66.6 27.4 -88.9
        c -14.1 -0.6 -28.3 2.3 -40.6 8.9
        c 2.7 -27.3 21.5 -50.4 47.1 -58.7

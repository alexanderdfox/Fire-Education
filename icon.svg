<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Swift programming language logo">
  <defs>
    <linearGradient id="swift-orange" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FA8F3E"/>
      <stop offset="0.55" stop-color="#F05138"/>
      <stop offset="1" stop-color="#D4281A"/>
    </linearGradient>
    <linearGradient id="swift-green" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DDB8A"/>
      <stop offset="0.55" stop-color="#34C759"/>
      <stop offset="1" stop-color="#1E8E3E"/>
    </linearGradient>
